  <text x="928" y="510" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Last Name</text>
  <rect x="928" y="526" width="328" height="52" rx="14" fill="#F6FAFE" stroke="#C8D6E5"/>
  <text x="948" y="559" fill="#8A97A8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Enter text</text>

  <text x="566" y="620" fill="#17324D" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Contact Info</text>
  <rect x="566" y="646" width="690" height="110" rx="20" fill="#FFFFFF" stroke="#D5DFEA"/>
  <text x="594" y="686" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Country</text>
  <rect x="594" y="700" width="260" height="44" rx="14" fill="#F6FAFE" stroke="#C8D6E5"/>
  <text x="614" y="728" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="18">Web</text>
  <path d="M830 717L840 727L850 717" stroke="#5F6F89" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="1080" y="784" width="176" height="56" rx="18" fill="#0F6CBD"/>
  <text x="1128" y="819" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Submit</text>

  <rect x="500" y="140" width="120" height="32" rx="16" fill="#E8F1FB"/>
  <text x="528" y="161" fill="#0F6CBD" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Starter</text>
