<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="980" fill="#EEF3F8"/>

  <text x="70" y="70" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">NativeForms Theme Mockup</text>
  <text x="70" y="104" fill="#5F6F89" font-family="Segoe UI, Arial, sans-serif" font-size="18">Starter scope visual model for reusable theme records assigned to forms.</text>

  <rect x="60" y="140" width="360" height="770" rx="24" fill="#FFFFFF" stroke="#D8E1EA"/>
  <text x="95" y="188" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Theme Settings</text>
  <text x="95" y="220" fill="#5F6F89" font-family="Segoe UI, Arial, sans-serif" font-size="16">Reusable theme object</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#17324D">
    <text x="95" y="280">Theme Name</text>
    <rect x="95" y="294" width="290" height="40" rx="10" fill="#F9FBFD" stroke="#CDD7E1"/>
    <text x="110" y="320" fill="#5F6F89">Corporate Blue</text>

    <text x="95" y="372">Logo</text>
    <rect x="95" y="386" width="290" height="78" rx="14" fill="#F9FBFD" stroke="#CDD7E1" stroke-dasharray="6 6"/>
