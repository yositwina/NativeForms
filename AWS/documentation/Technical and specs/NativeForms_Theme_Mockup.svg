  <rect x="455" y="140" width="925" height="770" rx="28" fill="#FFFFFF" stroke="#D8E1EA"/>
  <text x="500" y="190" fill="#17324D" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Live Theme Preview</text>
  <text x="500" y="224" fill="#5F6F89" font-family="Segoe UI, Arial, sans-serif" font-size="16">This is how the assigned theme could affect a real form.</text>

  <rect x="520" y="270" width="790" height="570" rx="24" fill="#FFFFFF" stroke="#D5DFEA" stroke-width="2"/>
