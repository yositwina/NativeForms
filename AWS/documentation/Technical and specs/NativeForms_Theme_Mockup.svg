    <rect x="247" y="514" width="138" height="40" rx="10" fill="#F9FBFD" stroke="#CDD7E1"/>
    <text x="262" y="540" fill="#5F6F89">Wide</text>

    <text x="95" y="590">Fonts</text>
    <rect x="95" y="604" width="138" height="40" rx="10" fill="#F9FBFD" stroke="#CDD7E1"/>
    <text x="110" y="630" fill="#5F6F89">Roboto Slab</text>
    <rect x="247" y="604" width="138" height="40" rx="10" fill="#F9FBFD" stroke="#CDD7E1"/>
    <text x="262" y="630" fill="#5F6F89">Inter</text>

    <text x="95" y="680">Colors</text>
  </g>

  <g>
    <circle cx="121" cy="721" r="18" fill="#0F6CBD"/>
    <circle cx="175" cy="721" r="18" fill="#17324D"/>
    <circle cx="229" cy="721" r="18" fill="#FFFFFF" stroke="#CDD7E1"/>
    <circle cx="283" cy="721" r="18" fill="#E7F0FA"/>
    <circle cx="337" cy="721" r="18" fill="#B42318"/>
