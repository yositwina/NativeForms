<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NativeForms Designer mockup showing New Form button beside Form picker and small create form dialog">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#edf6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#89a7c4" flood-opacity="0.18"/>
    </filter>
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#18324a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#eaf2fb"/>
  <rect x="0" y="0" width="1600" height="70" fill="#ffffff"/>
  <rect x="0" y="70" width="1600" height="18" fill="#1e7ed7" opacity="0.18"/>
  <text x="34" y="43" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#17324d" font-weight="700">NativeForms</text>
  <text x="170" y="43" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4d657e">Home</text>
  <text x="234" y="43" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#17324d" font-weight="700">Designer</text>
  <text x="318" y="43" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4d657e">Prefill</text>
  <text x="404" y="43" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4d657e">Submit</text>

  <rect x="8" y="88" width="1584" height="796" rx="24" fill="url(#bg)"/>
  <text x="42" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#172f49" font-weight="700">NativeForms Designer</text>

  <rect x="10" y="118" width="300" height="720" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <text x="28" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#1d6bc0" font-weight="700">Designer v8.7</text>

  <text x="28" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#516a83">Form</text>
  <rect x="28" y="226" width="206" height="38" rx="10" fill="#ffffff" stroke="#bfd3e8" stroke-width="2"/>
  <text x="44" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#21384f">FORM-0010 (form1)</text>
  <path d="M219 242 l8 8 l8 -8" fill="none" stroke="#6d8399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="244" y="226" width="48" height="38" rx="10" fill="#0f6cbd"/>
  <text x="258" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">+</text>

  <text x="28" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#516a83">Version</text>
  <rect x="28" y="316" width="264" height="38" rx="10" fill="#ffffff" stroke="#bfd3e8" stroke-width="2"/>
  <text x="44" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#21384f">V2 (Draft)</text>
  <path d="M277 332 l8 8 l8 -8" fill="none" stroke="#6d8399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="28" y="404" width="102" height="36" rx="10" fill="#0f6cbd"/>
  <text x="46" y="427" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">Publish Form</text>

  <rect x="358" y="146" width="834" height="610" rx="22" fill="#f7fbff" stroke="#d8e5f2" stroke-width="2"/>
  <rect x="392" y="171" width="766" height="354" rx="20" fill="#ffffff" stroke="#cfdeee" stroke-width="2"/>
  <rect x="1015" y="196" width="120" height="36" rx="18" fill="#0f6cbd"/>
  <text x="1030" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">Form Settings</text>

  <text x="438" y="296" font-family="Georgia, Times, serif" font-size="18" fill="#18324b" font-weight="700">Last Name</text>
  <rect x="438" y="316" width="664" height="46" rx="16" fill="#ffffff" stroke="#c8d8ea" stroke-width="2"/>
  <text x="456" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#71869a">Enter text</text>

  <text x="438" y="418" font-family="Georgia, Times, serif" font-size="18" fill="#18324b" font-weight="700">Mobile</text>
  <rect x="438" y="438" width="664" height="46" rx="16" fill="#ffffff" stroke="#c8d8ea" stroke-width="2"/>

  <rect x="1222" y="146" width="344" height="610" rx="22" fill="#ffffff" stroke="#d8e5f2" stroke-width="2"/>
  <text x="1341" y="184" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#20364d">Form Settings</text>
  <rect x="1246" y="220" width="296" height="150" rx="18" fill="#fbfdff" stroke="#d3e0ee" stroke-width="2"/>
  <text x="1262" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#21384f" font-weight="700">General</text>
  <text x="1262" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6e8298">Form: FORM-0010</text>
  <text x="1262" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6e8298">Theme</text>
  <rect x="1262" y="324" width="264" height="36" rx="10" fill="#ffffff" stroke="#bfd3e8" stroke-width="2"/>
  <text x="1278" y="347" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#516a83">Select Theme</text>

  <rect x="0" y="0" width="1600" height="900" fill="#11263a" opacity="0.16"/>

  <rect x="520" y="188" width="560" height="364" rx="22" fill="#ffffff" filter="url(#modalShadow)"/>
  <text x="554" y="236" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#16324a" font-weight="700">Create New Form</text>
  <text x="554" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6d8094">This creates the form record and its first draft version immediately.</text>

  <text x="554" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#36536f">Description</text>
  <rect x="554" y="334" width="492" height="92" rx="14" fill="#ffffff" stroke="#bfd3e8" stroke-width="2"/>
  <text x="574" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8296aa">Example: Contact intake form for new website leads</text>

  <rect x="554" y="448" width="20" height="20" rx="5" fill="#0f6cbd"/>
  <path d="M560 459 l5 5 l9 -10" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="586" y="463" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#27425c">Create first version in Draft mode</text>

  <rect x="554" y="490" width="492" height="1" fill="#e3edf6"/>
  <text x="554" y="520" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6f8498">Suggested UX: keep the dialog small, focused, and one-step.</text>

  <rect x="814" y="508" width="110" height="40" rx="12" fill="#ffffff" stroke="#bfd3e8" stroke-width="2"/>
  <text x="850" y="533" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#4e6781" font-weight="700">Cancel</text>

  <rect x="936" y="508" width="110" height="40" rx="12" fill="#0f6cbd"/>
  <text x="960" y="533" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="700">Create Form</text>

  <text x="520" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#16324a" font-weight="700">Recommended placement</text>
  <text x="520" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4d657e">Put a compact + button at the right edge of the Form picker.</text>
  <text x="520" y="646" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4d657e">It feels close to form switching, but still clearly separate from Publish.</text>
</svg>
