<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NativeForms Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h2 {
      margin-bottom: 8px;
    }
    .row {
      margin-top: 12px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      font-size: 14px;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
    }
    pre {
      margin-top: 20px;
      padding: 12px;
      background: #f4f4f4;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h2>NativeForms Demo</h2>
  <div>Prefill on load from <code>?email=...</code>, then submit to Salesforce.</div>

  <div class="row">
    <label for="lookupEmail">Lookup Email</label>
    <input id="lookupEmail" />
  </div>

  <div class="row">
    <label for="firstName">First Name</label>
    <input id="firstName" />
  </div>

  <div class="row">
    <label for="lastName">Last Name</label>
    <input id="lastName" />
  </div>

  <div class="row">
    <label for="email">Email</label>
    <input id="email" />
  </div>

  <div class="row">
    <label for="subject">Subject</label>
    <input id="subject" value="Browser test submission" />
  </div>

  <div class="row">
    <label for="description">Description</label>
    <textarea id="description">This was sent from the NativeForms demo page</textarea>
  </div>

  <input id="contactId" type="hidden" />

  <div class="actions">
    <button id="prefillBtn" type="button">Reload Prefill</button>
    <button id="sendBtn" type="button">Submit</button>
  </div>

  <pre id="result"></pre>

  <script>
    const PREFILL_URL = "https://a2guxusajjhwzakf3tg6ispb640pgsno.lambda-url.eu-north-1.on.aws/";
    const PREFILL_TOKEN = "abc123";
    const SUBMIT_TOKEN = "abc123";
    const SUBMIT_URL = "https://hfkuwm6emqiaz2drmuip6zqn5m0agbyp.lambda-url.eu-north-1.on.aws/";

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function setDebug(title, obj) {
      const resultEl = document.getElementById("result");
      if (typeof obj === "string") {
        resultEl.textContent = title + "\n" + obj;
      } else {
        resultEl.textContent = title + "\n" + JSON.stringify(obj, null, 2);
      }
    }

    async function loadPrefill() {
      const lookupEmail = document.getElementById("lookupEmail").value.trim();

      if (!lookupEmail) {
        setDebug("Prefill", "No email provided");
        return;
      }

      const payload = {
        prefillToken: PREFILL_TOKEN,
        request: {
          formId: "testForm",
          params: {
            email: lookupEmail
          },
          commands: [
            {
              type: "findOne",
              commandKey: "findContact",
              objectApiName: "Contact",
              where: {
                Email: "{params.email}"
              },
              fieldsToReturn: ["Id", "Email", "LastName", "FirstName"],
              storeResultAs: "foundContact"
            }
          ],
          responseMapping: {
            "input.email": "{foundContact.Email}",
            "input.lastName": "{foundContact.LastName}",
            "input.firstName": "{foundContact.FirstName}",
            "hidden.contactId": "{foundContact.Id}"
          }
        }
      };

      try {
        setDebug("Prefill", "Loading...");

        const response = await fetch(PREFILL_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        setDebug("Prefill response", result);

        if (!result.success) {
          return;
        }

        document.getElementById("firstName").value = result.input?.firstName || "";
        document.getElementById("lastName").value = result.input?.lastName || "";
        document.getElementById("email").value = result.input?.email || lookupEmail;
        document.getElementById("contactId").value = result.hidden?.contactId || "";
      } catch (err) {
        setDebug("Prefill error", err.message || String(err));
      }
    }

    async function submitForm() {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const description = document.getElementById("description").value.trim();
      const contactId = document.getElementById("contactId").value.trim();

      const payload = {
        formToken: SUBMIT_TOKEN,
        input: {
          firstName,
          lastName,
          email,
          subject,
          description,
          contactId
        },
        commands: [
          {
            type: "create",
            commandKey: "createCase",
            objectApiName: "Case",
            fields: {
              Subject: "{input.subject}",
              Description: "{input.description}",
              Origin: "Web",
              ContactId: "{input.contactId}"
            },
            storeResultAs: "createdCase"
          }
        ]
      };

      try {
        setDebug("Submit", "Sending...");

        const response = await fetch(SUBMIT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        setDebug("Submit response", data);
      } catch (error) {
        setDebug("Submit error", error.message || String(error));
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("prefillBtn").addEventListener("click", loadPrefill);
      document.getElementById("sendBtn").addEventListener("click", submitForm);

      const emailFromUrl = getQueryParam("email");
      if (emailFromUrl) {
        document.getElementById("lookupEmail").value = emailFromUrl;
        loadPrefill();
      } else {
        setDebug("Init", "Open with ?email=known@email.com or use Reload Prefill");
      }
    });
  </script>
</body>
</html>
