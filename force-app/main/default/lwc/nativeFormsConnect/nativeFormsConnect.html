<template>
    <lightning-card title="TwinaForms Connect" icon-name="custom:custom18">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="slds-text-body_regular slds-m-bottom_medium">
                Connect this Salesforce org to TwinaForms so AWS can publish forms and run prefill and submit securely.
            </p>

            <template if:true={showConnectionStatusSection}>
                <div class="status-panel slds-m-bottom_medium">
                    <p class="status-panel__title">Connection Status</p>
                    <p class="status-panel__line"><strong>Status:</strong> {connectionStatusLabel}</p>
                    <p class="status-panel__line"><strong>Salesforce Connection:</strong> {salesforceConnectionLabel}</p>
                    <p class="status-panel__line"><strong>Service Access:</strong> {serviceAccessLabel}</p>
                    <p class="status-panel__line"><strong>Setup State:</strong> {setupState}</p>
                    <p class="status-panel__line"><strong>Org Id:</strong> {orgId}</p>
                </div>
            </template>

            <template if:true={isInitializing}>
                <lightning-spinner alternative-text="Loading setup context" size="small"></lightning-spinner>
            </template>

            <template if:true={showOauthCompleteBanner}>
                <div class="stage-complete slds-m-bottom_medium">
                    <p class="stage-complete__title">Step 1 Complete</p>
                    <p class="stage-complete__text">Salesforce OAuth connection is active.</p>
                </div>
            </template>

            <template if:true={showTenantSetupStage}>
                <section class="setup-stage slds-m-bottom_large">
                    <div class="setup-stage__header">
                        <div>
                            <p class="setup-stage__eyebrow">Step 1</p>
                            <h2 class="setup-stage__title">Connect Salesforce</h2>
                        </div>
                    </div>

                    <div class="instruction-box slds-m-top_medium">
                        <p class="instruction-title"><strong>Start here</strong></p>
                        <p class="instruction-text-block">
                            Click <strong>Prepare Connection</strong>. TwinaForms will create the org registration and prepare the Salesforce authorization link.
                        </p>
                        <p class="instruction-text-block slds-m-top_small">
                            Salesforce will open a secure OAuth connection to TwinaForms. After approval, secure service access is verified automatically.
                        </p>
                    </div>

                    <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-1">
                            <lightning-input
                                label="Admin Email"
                                value={adminEmail}
                                onchange={handleChange}
                                data-field="adminEmail">
                            </lightning-input>
                        </div>
                    </div>

                    <div class="stage-actions slds-m-top_medium">
                        <template if:true={showGenerateSecretAction}>
                            <lightning-button
                                variant="brand"
                                label="Prepare Connection"
                                onclick={handleGenerateSecret}
                                disabled={actionDisabled}>
                            </lightning-button>
                        </template>
                        <template if:true={showTestTenantAction}>
                            <lightning-button
                                label="Test Service Access"
                                onclick={handleTestTenantSetup}
                                disabled={actionDisabled}>
                            </lightning-button>
                        </template>
                    </div>

                    <template if:true={showTenantTestMessage}>
                        <div class={tenantTestMessageClass}>
                            {tenantTestMessage}
                        </div>
                    </template>

                </section>
            </template>

            <template if:true={showServiceAccessCompleteBanner}>
                <div class="stage-complete slds-m-bottom_medium">
                    <p class="stage-complete__title">Step 2 Complete</p>
                    <p class="stage-complete__text">TwinaForms secure service access is verified for this org.</p>
                </div>
            </template>

            <template if:true={showOauthStage}>
                <section class="setup-stage">
                    <div class="setup-stage__header">
                        <div>
                            <p class="setup-stage__eyebrow">Step 1</p>
                            <h2 class="setup-stage__title">Connect Salesforce</h2>
                        </div>
                    </div>

                    <div class="instruction-box slds-m-top_medium">
                        <p class="instruction-title"><strong>Authorize TwinaForms</strong></p>
                        <p class="instruction-text-block">
                            Click <strong>Connect TwinaForms</strong> and approve access in the Salesforce window that opens.
                        </p>
                        <p class="instruction-text-block slds-m-top_small">
                            After approval, return here. This page will refresh automatically and verify secure service access.
                        </p>
                    </div>

                    <div class="stage-actions slds-m-top_medium">
                        <template if:true={showConnectAction}>
                            <lightning-button
                                variant="brand"
                                label="Connect TwinaForms"
                                onclick={handleConnect}
                                disabled={actionDisabled}>
                            </lightning-button>
                        </template>

                        <template if:true={showRefreshAction}>
                            <lightning-button
                                label="Refresh Connection Status"
                                onclick={handleRefreshStatus}
                                disabled={actionDisabled}>
                            </lightning-button>
                        </template>
                    </div>

                    <template if:true={showRefreshAction}>
                        <div class="awaiting-auth-box slds-m-top_medium">
                            <p class="awaiting-auth-box__title">Finish in the Salesforce window</p>
                            <p class="awaiting-auth-box__text">
                                TwinaForms opened the Salesforce authentication page in a new tab or window.
                            </p>
                            <p class="awaiting-auth-box__text">
                                After you finish authentication there, this page will refresh the connection status automatically.
                            </p>
                        </div>
                    </template>
                </section>
            </template>

            <template if:true={showServiceAccessStage}>
                <section class="setup-stage slds-m-bottom_large">
                    <div class="setup-stage__header">
                        <div>
                            <p class="setup-stage__eyebrow">Step 2</p>
                            <h2 class="setup-stage__title">Verify secure service access</h2>
                        </div>
                    </div>

                    <div class="instruction-box slds-m-top_medium">
                        <p class="instruction-title"><strong>Confirm the secure connection</strong></p>
                        <p class="instruction-text-block">
                            TwinaForms uses a package-generated signing key so Salesforce can call AWS securely without manual credential setup.
                        </p>
                    </div>

                    <template if:true={isVerifyingServiceAccess}>
                        <div class="slds-m-top_medium">
                            <lightning-spinner alternative-text="Verifying secure service access" size="small"></lightning-spinner>
                        </div>
                    </template>

                    <template if:true={showTenantTestMessage}>
                        <div class={tenantTestMessageClass}>
                            {tenantTestMessage}
                        </div>
                    </template>
                </section>
            </template>

            <template if:true={showDemoInstallStage}>
                <section class="setup-stage slds-m-bottom_large">
                    <div class="setup-stage__header">
                        <div>
                            <p class="setup-stage__eyebrow">Step 3</p>
                            <h2 class="setup-stage__title">Install demo records</h2>
                        </div>
                    </div>

                    <div class="instruction-box slds-m-top_medium">
                        <p class="instruction-title"><strong>Start with a sample workspace</strong></p>
                        <p class="instruction-text-block">
                            Add a General project, sample forms, and seed Contacts so you can explore TwinaForms right away.
                        </p>
                    </div>

                    <div class="stage-actions slds-m-top_medium">
                        <lightning-button
                            variant="brand"
                            label="Install Demo Records"
                            onclick={handleInstallDemoRecords}
                            disabled={actionDisabled}>
                        </lightning-button>
                        <lightning-button
                            label="Skip for Now"
                            onclick={handleSkipDemoRecords}
                            disabled={actionDisabled}>
                        </lightning-button>
                    </div>
                </section>
            </template>

            <template if:true={showAccessSection}>
                <section class="access-section slds-m-top_large">
                    <div class="access-section__header">
                        <div>
                            <p class="access-section__eyebrow">User Access</p>
                            <h3 class="access-section__title">Manage TwinaForms seats and admin access</h3>
                        </div>
                        <div class="access-section__pills">
                            <span class="status-pill status-pill--neutral">TwinaForms Users {usage.activeUsersLabel}</span>
                            <span class={adminAppStatusClass}>Admin App {adminAppStatusLabel}</span>
                        </div>
                    </div>

                    <p class="access-section__copy">
                        <strong>Grant Seat</strong> assigns TwinaForms user access.
                        <strong>TwinaForms Admin</strong> is support/debug access and only opens when enabled from the TwinaForms Admin console.
                    </p>

                    <div class="access-grid">
                        <article class="access-panel">
                            <div class="access-panel__heading">
                                <div>
                                    <p class="access-panel__kicker">Customer Seats</p>
                                    <h4>{access.userPermissionSetLabel}</h4>
                                </div>
                            </div>

                            <div class="access-list">
                                <template for:each={userAssignments} for:item="userItem">
                                    <div key={userItem.userId} class="access-list__row">
                                        <div class="access-list__copy">
                                            <strong>{userItem.name}</strong>
                                            <span>{userItem.email}</span>
                                        </div>
                                        <lightning-button
                                            variant="neutral"
                                            label="Remove"
                                            data-user-id={userItem.userId}
                                            data-access-type="user"
                                            data-enabled="false"
                                            onclick={handleToggleAccess}
                                            disabled={isUpdatingAccess}>
                                        </lightning-button>
                                    </div>
                                </template>

                                <template if:false={hasUserAssignments}>
                                    <div class="access-empty">No Salesforce users have TwinaForms seat access yet.</div>
                                </template>
                            </div>

                            <div class="access-grant">
                                <lightning-combobox
                                    label="Add TwinaForms User"
                                    value={selectedUserGrantId}
                                    options={availableUserGrantOptions}
                                    placeholder="Choose an active Salesforce user"
                                    onchange={handleUserGrantSelection}>
                                </lightning-combobox>
                                <lightning-button
                                    variant="brand"
                                    label="Grant Seat"
                                    onclick={handleGrantUserAccess}
                                    disabled={userGrantDisabled}>
                                </lightning-button>
                            </div>
                        </article>

                        <template if:true={adminAppOpen}>
                            <article class="access-panel">
                                <div class="access-panel__heading">
                                    <div>
                                        <p class="access-panel__kicker">Support / Debug</p>
                                        <h4>{access.adminPermissionSetLabel}</h4>
                                    </div>
                                </div>

                                <div class="access-list">
                                    <template for:each={adminAssignments} for:item="userItem">
                                        <div key={userItem.userId} class="access-list__row">
                                            <div class="access-list__copy">
                                                <strong>{userItem.name}</strong>
                                                <span>{userItem.email}</span>
                                            </div>
                                            <lightning-button
                                                variant="neutral"
                                                label="Remove"
                                                data-user-id={userItem.userId}
                                                data-access-type="admin"
                                                data-enabled="false"
                                                onclick={handleToggleAccess}
                                                disabled={isUpdatingAccess}>
                                            </lightning-button>
                                        </div>
                                    </template>

                                    <template if:false={hasAdminAssignments}>
                                        <div class="access-empty">No users currently have TwinaForms Admin access.</div>
                                    </template>
                                </div>

                                <div class="access-grant">
                                    <lightning-combobox
                                        label="Add TwinaForms Admin"
                                        value={selectedAdminGrantId}
                                        options={availableAdminGrantOptions}
                                        placeholder="Choose an active Salesforce user"
                                        onchange={handleAdminGrantSelection}
                                        disabled={adminGrantComboboxDisabled}>
                                    </lightning-combobox>
                                    <lightning-button
                                        variant="brand"
                                        label="Grant Admin Access"
                                        onclick={handleGrantAdminAccess}
                                        disabled={adminGrantDisabled}>
                                    </lightning-button>
                                </div>
                            </article>
                        </template>
                    </div>
                </section>
            </template>
        </div>
    </lightning-card>
</template>
