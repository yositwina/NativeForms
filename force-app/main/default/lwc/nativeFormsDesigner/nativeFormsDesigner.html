<template>
    <lightning-card>
        <div class="designer-shell">
            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading designer"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <section class="designer-topbar">
                    <div class="designer-topbar__left">
                        <div class="designer-topbar__field designer-topbar__field--form designer-topbar__field--inline">
                            <span class="designer-topbar__inline-label">Form</span>
                            <lightning-combobox
                                name="formId"
                                variant="label-hidden"
                                label="Form"
                                value={selectedFormId}
                                options={formOptions}
                                placeholder="Select form"
                                onchange={handleFormChange}>
                            </lightning-combobox>
                        </div>

                        <div class="designer-topbar__field designer-topbar__field--version designer-topbar__field--inline">
                            <span class="designer-topbar__inline-label">Form Version</span>
                            <lightning-combobox
                                name="versionId"
                                variant="label-hidden"
                                label="Form Version"
                                value={selectedVersionId}
                                options={versionOptions}
                                placeholder="Select version"
                                onchange={handleVersionChange}>
                            </lightning-combobox>
                        </div>

                        <div class="designer-topbar__action">
                            <lightning-button
                                variant="brand"
                                label="Publish Form"
                                disabled={isSelectedVersionReadOnly}
                                onclick={handlePublishVersion}>
                            </lightning-button>
                        </div>

                        <template if:true={isSelectedVersionReadOnly}>
                            <div class="designer-topbar__result designer-topbar__result--error">
                                <span>This published version is read-only.</span>
                                <template if:true={hasSelectedPublishedUrl}>
                                    <a href={selectedPublishedUrl} target="_blank" rel="noopener">Open published form</a>
                                </template>
                            </div>
                        </template>

                        <template if:true={publishResult}>
                            <div class={publishResultInlineClass}>
                                <span>{publishResultInlineMessage}</span>
                                <template if:true={publishResult.publicUrl}>
                                    <a href={publishResult.publicUrl} target="_blank" rel="noopener">{publishResultLinkLabel}</a>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="designer-topbar__right">
                        <lightning-button
                            variant="brand-outline"
                            label="+ New Form"
                            onclick={handleOpenNewFormModal}>
                        </lightning-button>
                    </div>
                </section>

                <div class="designer-layout">
                    <section class="pane pane-left">
                        <p class="designer-version">Designer {designerVersion}</p>

                        <template if:true={selectedFormDescription}>
                            <p class="designer-form-description">{selectedFormDescription}</p>
                        </template>

                        <div class="pane-header">
                            <h2>Add Building Blocks</h2>
                        </div>

                        <div class="add-block">
                            <h3>Input Field</h3>
                            <div class="builder-list" role="list">
                                <template for:each={inputFieldOptions} for:item="option">
                                    <div key={option.value} class="builder-list__row" role="listitem">
                                        <span class="builder-list__label">{option.label}</span>
                                        <button
                                            type="button"
                                            class="builder-list__action"
                                            data-type={option.value}
                                            disabled={isSelectedVersionReadOnly}
                                            onclick={handleQuickAddField}>
                                            Add
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="add-block">
                            <h3>Display Element</h3>
                            <div class="builder-list" role="list">
                                <template for:each={availableDisplayElementOptions} for:item="option">
                                    <div key={option.value} class="builder-list__row" role="listitem">
                                        <span class="builder-list__label">{option.label}</span>
                                        <button
                                            type="button"
                                            class="builder-list__action"
                                            data-type={option.value}
                                            disabled={isSelectedVersionReadOnly}
                                            onclick={handleQuickAddField}>
                                            Add
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </section>

                    <section class="pane pane-center">
                        <template if:true={elements.length}>
                            <div class="designer-canvas-shell" style={designerCanvasThemeStyle}>
                                <div class="designer-form-surface">
                                <div class="designer-form-toolbar">
                                    <button
                                        type="button"
                                        class={formSettingsButtonClass}
                                        onclick={handleOpenFormSettings}>
                                        Form Settings
                                    </button>
                                </div>
                                <template if:true={showThemeLogo}>
                                    <div class={themeLogoWrapClass}>
                                        <img src={themeLogoUrl} alt="Theme logo" class="designer-logo" style={themeLogoStyle} />
                                    </div>
                                </template>
                                <div class="designer-canvas" onclick={handleCanvasClick}>
                                <template for:each={canvasRows} for:item="row">
                                    <div
                                        key={row.dropKey}
                                        class={row.dropClass}
                                        data-index={row.index}
                                        ondragover={handleDragOver}
                                        ondragleave={handleDragLeave}
                                        ondrop={handleDrop}>
                                    </div>
                                    <template if:true={row.hasItem}>
                                        <article
                                            key={row.item.id}
                                            class={row.item.cardClass}
                                            data-id={row.item.id}
                                            draggable={row.item.isTopLevelDraggable}
                                            onclick={handleSelectElement}
                                            ondragstart={handleDragStart}
                                            ondragend={handleDragEnd}>
                                        <template if:true={row.item.showHiddenBadge}>
                                            <div class="preview-hidden-badge">Hidden</div>
                                        </template>
                                        <template if:true={row.item.showConditionalBadge}>
                                            <div class="preview-conditional-badge">{row.item.conditionalSummary}</div>
                                        </template>
                                        <template lwc:if={row.item.isSectionLike}>
                                            <div class="preview-section" style={row.item.cardStyle}>
                                                <div class="preview-section__top">
                                                    <template if:true={row.item.showTitle}>
                                                        <div class="preview-section__title">{row.item.label}</div>
                                                    </template>
                                                </div>
                                                <div class={row.item.sectionColumnClass}>
                                                    <template for:each={row.item.sectionSlots} for:item="column">
                                                        <div
                                                            key={column.key}
                                                            class={column.dropClass}
                                                            data-section-id={column.sectionId}
                                                            data-column={column.columnValue}
                                                            ondragover={handleSectionDragOver}
                                                            ondragleave={handleSectionDragLeave}
                                                            ondrop={handleDropIntoSection}>
                                                            <template if:true={column.hasChildren}>
                                                                <div
                                                                    class="preview-column-slot__items"
                                                                    data-section-id={column.sectionId}
                                                                    data-column={column.columnValue}
                                                                    ondragover={handleSectionDragOver}
                                                                    ondragleave={handleSectionDragLeave}
                                                                    ondrop={handleDropIntoSection}>
                                                                    <template for:each={column.childItems} for:item="child">
                                                                        <article
                                                                            key={child.id}
                                                                            class={child.cardClass}
                                                                            data-id={child.id}
                                                                            draggable={child.isChildDraggable}
                                                                            onclick={handleSelectElement}
                                                                            ondragstart={handleDragStart}
                                                                            ondragend={handleDragEnd}>
                                                                            <template if:true={child.showHiddenBadge}>
                                                                                <div class="preview-hidden-badge">Hidden</div>
                                                                            </template>
                                                                            <template if:true={child.showConditionalBadge}>
                                                                                <div class="preview-conditional-badge">{child.conditionalSummary}</div>
                                                                            </template>
                                                                            <template lwc:if={child.isCheckbox}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <div class="preview-checkbox__control">
                                                                                        <input type="checkbox" disabled />
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isHeading}>
                                                                                <div class={child.previewTextClass}>
                                                                                    <lightning-formatted-rich-text value={child.previewHtml}></lightning-formatted-rich-text>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isImage}>
                                                                                <div class="preview-image">
                                                                                    <div class={child.imageFrameClass}>
                                                                                        <template if:true={child.previewImageUrl}>
                                                                                            <img src={child.previewImageUrl} alt={child.previewImageAlt} class={child.imageClass} style={child.imageStyle} />
                                                                                        </template>
                                                                                        <template if:false={child.previewImageUrl}>
                                                                                            <span>{child.previewText}</span>
                                                                                        </template>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isSelect}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <select disabled>
                                                                                        <template for:each={child.previewOptions} for:item="option">
                                                                                            <option key={option.value}>{option.label}</option>
                                                                                        </template>
                                                                                    </select>
                                                                                    <template if:true={child.showExpandedPicklist}>
                                                                                        <div class="preview-select-options">
                                                                                            <template for:each={child.previewOptions} for:item="option">
                                                                                                <div key={option.value} class="preview-select-options__item">{option.label}</div>
                                                                                            </template>
                                                                                        </div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isRadio}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <div class="preview-radio-group">
                                                                                        <template for:each={child.previewOptions} for:item="option">
                                                                                            <label key={option.value} class="preview-radio-option">
                                                                                                <input type="radio" checked={option.checked} disabled />
                                                                                                <span>{option.label}</span>
                                                                                            </label>
                                                                                        </template>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isTextarea}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <textarea disabled>{child.previewPlaceholder}</textarea>
                                                                                    <template if:true={child.validationPattern}>
                                                                                        <div class="preview-validation-hint">{child.validationPattern}</div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:else>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <input type={child.previewInputType} value={child.previewPlaceholder} disabled />
                                                                                    <template if:true={child.validationPattern}>
                                                                                        <div class="preview-validation-hint">{child.validationPattern}</div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                        </article>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:false={column.hasChildren}>
                                                                Column {column.label}
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isRepeatGroup}>
                                            <div class="preview-section preview-repeat-group" style={row.item.cardStyle}>
                                                <div class="preview-section__top">
                                                    <template if:true={row.item.showTitle}>
                                                        <div class="preview-section__title">{row.item.label}</div>
                                                    </template>
                                                    <div class="preview-repeat-group__meta">
                                                        <span>Repeat Group</span>
                                                        <template if:true={row.item.repeatSourceAlias}>
                                                            <span>Source: {row.item.repeatSourceAlias}</span>
                                                        </template>
                                                    </div>
                                                </div>
                                                <div class={row.item.sectionColumnClass}>
                                                    <template for:each={row.item.sectionSlots} for:item="column">
                                                        <div
                                                            key={column.key}
                                                            class={column.dropClass}
                                                            data-section-id={column.sectionId}
                                                            data-column={column.columnValue}
                                                            ondragover={handleSectionDragOver}
                                                            ondragleave={handleSectionDragLeave}
                                                            ondrop={handleDropIntoSection}>
                                                            <template if:true={column.hasChildren}>
                                                                <div
                                                                    class="preview-column-slot__items"
                                                                    data-section-id={column.sectionId}
                                                                    data-column={column.columnValue}
                                                                    ondragover={handleSectionDragOver}
                                                                    ondragleave={handleSectionDragLeave}
                                                                    ondrop={handleDropIntoSection}>
                                                                    <template for:each={column.childItems} for:item="child">
                                                                        <article
                                                                            key={child.id}
                                                                            class={child.cardClass}
                                                                            data-id={child.id}
                                                                            draggable={child.isChildDraggable}
                                                                            onclick={handleSelectElement}
                                                                            ondragstart={handleDragStart}
                                                                            ondragend={handleDragEnd}>
                                                                            <template if:true={child.showHiddenBadge}>
                                                                                <div class="preview-hidden-badge">Hidden</div>
                                                                            </template>
                                                                            <template if:true={child.showConditionalBadge}>
                                                                                <div class="preview-conditional-badge">{child.conditionalSummary}</div>
                                                                            </template>
                                                                            <template lwc:if={child.isCheckbox}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <div class="preview-checkbox__control">
                                                                                        <input type="checkbox" checked={child.previewChecked} disabled />
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isHeading}>
                                                                                <div class={child.previewTextClass}>
                                                                                    <lightning-formatted-rich-text value={child.previewHtml}></lightning-formatted-rich-text>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isImage}>
                                                                                <div class="preview-image">
                                                                                    <div class={child.imageFrameClass}>
                                                                                        <template if:true={child.previewImageUrl}>
                                                                                            <img src={child.previewImageUrl} alt={child.previewImageAlt} class={child.imageClass} style={child.imageStyle} />
                                                                                        </template>
                                                                                        <template if:false={child.previewImageUrl}>
                                                                                            <span>{child.previewText}</span>
                                                                                        </template>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isSelect}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <select value={child.previewPlaceholder} disabled>
                                                                                        <template for:each={child.previewOptions} for:item="option">
                                                                                            <option key={option.value}>{option.label}</option>
                                                                                        </template>
                                                                                    </select>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isRadio}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <div class="preview-radio-group">
                                                                                        <template for:each={child.previewOptions} for:item="option">
                                                                                            <label key={option.value} class="preview-radio-option">
                                                                                                <input type="radio" checked={option.checked} disabled />
                                                                                                <span>{option.label}</span>
                                                                                            </label>
                                                                                        </template>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:elseif={child.isTextarea}>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <textarea disabled>{child.previewPlaceholder}</textarea>
                                                                                </div>
                                                                            </template>
                                                                            <template lwc:else>
                                                                                <div class={child.fieldPreviewClass}>
                                                                                    <template if:true={child.showLabel}>
                                                                                        <label class={child.labelClass}>{child.label}</label>
                                                                                    </template>
                                                                                    <input type={child.previewInputType} value={child.previewPlaceholder} disabled />
                                                                                </div>
                                                                            </template>
                                                                        </article>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                            <template if:false={column.hasChildren}>
                                                                Add fields here
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isCheckbox}>
                                            <div class={row.item.fieldPreviewClass}>
                                                <template if:true={row.item.showLabel}>
                                                    <label class={row.item.labelClass}>{row.item.label}</label>
                                                </template>
                                                <div class="preview-checkbox__control">
                                                    <input type="checkbox" checked={row.item.previewChecked} disabled />
                                                </div>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isHeading}>
                                            <div class={row.item.previewTextClass}>
                                                <lightning-formatted-rich-text value={row.item.previewHtml}></lightning-formatted-rich-text>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isImage}>
                                            <div class="preview-image">
                                                <div class={row.item.imageFrameClass}>
                                                    <template if:true={row.item.previewImageUrl}>
                                                        <img src={row.item.previewImageUrl} alt={row.item.previewImageAlt} class={row.item.imageClass} style={row.item.imageStyle} />
                                                    </template>
                                                    <template if:false={row.item.previewImageUrl}>
                                                        <span>Image placeholder</span>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isSelect}>
                                            <div class={row.item.fieldPreviewClass}>
                                                <template if:true={row.item.showLabel}>
                                                    <label class={row.item.labelClass}>{row.item.label}</label>
                                                </template>
                                                <select value={row.item.previewPlaceholder} disabled>
                                                    <template for:each={row.item.previewOptions} for:item="option">
                                                        <option key={option.value}>{option.label}</option>
                                                    </template>
                                                </select>
                                                <template if:true={row.item.showExpandedPicklist}>
                                                    <div class="preview-select-options">
                                                        <template for:each={row.item.previewOptions} for:item="option">
                                                            <div key={option.value} class="preview-select-options__item">{option.label}</div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isRadio}>
                                            <div class={row.item.fieldPreviewClass}>
                                                <template if:true={row.item.showLabel}>
                                                    <label class={row.item.labelClass}>{row.item.label}</label>
                                                </template>
                                                <div class="preview-radio-group">
                                                    <template for:each={row.item.previewOptions} for:item="option">
                                                        <label key={option.value} class="preview-radio-option">
                                                            <input type="radio" checked={option.checked} disabled />
                                                            <span>{option.label}</span>
                                                        </label>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <template lwc:elseif={row.item.isTextarea}>
                                            <div class={row.item.fieldPreviewClass}>
                                                <template if:true={row.item.showLabel}>
                                                    <label class={row.item.labelClass}>{row.item.label}</label>
                                                </template>
                                                <textarea disabled>{row.item.previewPlaceholder}</textarea>
                                                <template if:true={row.item.validationPattern}>
                                                    <div class="preview-validation-hint">{row.item.validationPattern}</div>
                                                </template>
                                            </div>
                                        </template>

                                        <template lwc:else>
                                            <div class={row.item.fieldPreviewClass}>
                                                <template if:true={row.item.showLabel}>
                                                    <label class={row.item.labelClass}>{row.item.label}</label>
                                                </template>
                                                <input type={row.item.previewInputType} value={row.item.previewPlaceholder} disabled />
                                                <template if:true={row.item.validationPattern}>
                                                    <div class="preview-validation-hint">{row.item.validationPattern}</div>
                                                </template>
                                            </div>
                                        </template>
                                    </article>
                                    </template>
                                </template>
                                </div>
                                </div>
                            </div>
                        </template>
                        <template if:false={elements.length}>
                            <div class="empty-state">
                                Choose a form and version, then add a Section, Text Input, or Checkbox to start shaping the new canvas.
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-right">
                        <div class="pane-header">
                            <h2>{rightPaneTitle}</h2>
                        </div>

                        <template if:true={isSelectedVersionReadOnly}>
                            <div class="empty-state">
                                This published version is locked. Use the version picker to open a draft for editing.
                            </div>
                        </template>
                        <template if:true={selectedElement}>
                            <template if:false={isSelectedVersionReadOnly}>
                            <div class="selection-card">
                                <p class="selection-label">Field Type</p>
                                <div class="property-inline-row property-inline-row--type property-inline-row--top">
                                    <div class="property-inline-row__grow">
                                        <lightning-combobox
                                            variant="label-hidden"
                                            label="Field Type"
                                            value={editorElementType}
                                            options={editorElementTypeOptions}
                                            onchange={handleEditorTypeChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>

                            <div class="selection-card">
                                <p class="selection-label">Display Settings</p>

                                <lightning-input
                                    label="Field Label"
                                    value={editorLabel}
                                    onchange={handleEditorLabelChange}>
                                </lightning-input>

                                <template if:true={selectedElementSupportsBoldLabel}>
                                    <lightning-input
                                        type="checkbox"
                                        label="Bold Label"
                                        checked={editorLabelBold}
                                        onchange={handleEditorLabelBoldChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={selectedElementSupportsLabelPosition}>
                                    <div class="behavior-radio-group">
                                        <div class="behavior-radio-group__label-row">
                                            <label class="slds-form-element__label">Label Placement</label>
                                        </div>
                                        <div class="behavior-radio-group__options" role="radiogroup" aria-label="Label Position">
                                            <template for:each={labelPositionRadioOptions} for:item="option">
                                                <label key={option.value} class="behavior-radio-option">
                                                    <input
                                                        type="radio"
                                                        name="labelPosition"
                                                        value={option.value}
                                                        checked={option.checked}
                                                        onchange={handleEditorLabelPositionChange} />
                                                    <span>{option.label}</span>
                                                </label>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <template if:true={selectedElementSupportsDefaultValue}>
                                    <lightning-input
                                        label="Default Value"
                                        value={editorPlaceholder}
                                        onchange={handleEditorPlaceholderChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={selectedElementIsDate}>
                                    <lightning-combobox
                                        label="Display Format"
                                        value={editorDateDisplayFormat}
                                        options={dateDisplayFormatOptions}
                                        onchange={handleEditorDateDisplayFormatChange}>
                                    </lightning-combobox>
                                    <lightning-combobox
                                        label="Timezone / GMT Offset"
                                        value={editorDateGmtOffset}
                                        options={dateGmtOffsetOptions}
                                        onchange={handleEditorDateGmtOffsetChange}>
                                    </lightning-combobox>
                                    <p class="selection-hint">{selectedDateFormatHelpText}</p>
                                </template>

                                <p class="property-inline-text">
                                    <span class="property-inline-text__label">Internal Name (ID):</span>
                                    <span class="property-inline-text__value">{selectedElementFieldKey}</span>
                                </p>

                                <template if:true={selectedElementSupportsDisplayFieldBehavior}>
                                    <div class="behavior-radio-group">
                                        <div class="behavior-radio-group__label-row">
                                            <label class="slds-form-element__label">User Access</label>
                                        </div>
                                        <div class="behavior-radio-group__options" role="radiogroup" aria-label="Field Behavior">
                                            <template for:each={fieldBehaviorRadioOptions} for:item="option">
                                                <label key={option.value} class="behavior-radio-option">
                                                    <input
                                                        type="radio"
                                                        name="fieldBehaviorDisplay"
                                                        value={option.value}
                                                        checked={option.checked}
                                                        onchange={handleEditorFieldBehaviorChange} />
                                                    <span>{option.label}</span>
                                                </label>
                                            </template>
                                        </div>
                                        <p class="behavior-help-text">Locked means the field becomes read-only only when it already has a value, such as from prefill.</p>
                                    </div>
                                </template>

                                <template if:true={selectedElementIsSection}>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Title"
                                        checked={editorShowTitle}
                                        onchange={handleEditorShowTitleChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Rectangular Box"
                                        checked={editorBoxed}
                                        onchange={handleEditorBoxedChange}>
                                    </lightning-input>
                                    <lightning-combobox
                                        label="Columns"
                                        value={editorColumns}
                                        options={sectionColumnOptions}
                                        onchange={handleEditorColumnsChange}>
                                    </lightning-combobox>
                                </template>

                                <template if:true={selectedElementIsGroup}>
                                    <lightning-combobox
                                        label="Columns"
                                        value={editorColumns}
                                        options={sectionColumnOptions}
                                        onchange={handleEditorColumnsChange}>
                                    </lightning-combobox>
                                </template>

                                <template if:true={selectedElementIsRepeatGroup}>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Title"
                                        checked={editorShowTitle}
                                        onchange={handleEditorShowTitleChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Rectangular Box"
                                        checked={editorBoxed}
                                        onchange={handleEditorBoxedChange}>
                                    </lightning-input>
                                    <lightning-combobox
                                        label="Columns"
                                        value={editorColumns}
                                        options={sectionColumnOptions}
                                        onchange={handleEditorColumnsChange}>
                                    </lightning-combobox>
                                </template>
                            </div>

                            <div class="selection-card">
                                <p class="selection-label">Behavior</p>
                                <template if:true={selectedElementSupportsBehaviorFieldBehavior}>
                                    <div class="behavior-radio-group">
                                        <div class="behavior-radio-group__label-row">
                                            <label class="slds-form-element__label">User Access</label>
                                        </div>
                                        <div class="behavior-radio-group__options" role="radiogroup" aria-label="Field Behavior">
                                            <template for:each={fieldBehaviorRadioOptions} for:item="option">
                                                <label key={option.value} class="behavior-radio-option">
                                                    <input
                                                        type="radio"
                                                        name="fieldBehavior"
                                                        value={option.value}
                                                        checked={option.checked}
                                                        onchange={handleEditorFieldBehaviorChange} />
                                                    <span>{option.label}</span>
                                                </label>
                                            </template>
                                        </div>
                                        <p class="behavior-help-text">Locked means the field becomes read-only only when it already has a value, such as from prefill.</p>
                                    </div>
                                </template>

                                <template if:true={selectedElementIsNumber}>
                                    <lightning-input
                                        label="Min Value"
                                        value={editorMinValue}
                                        onchange={handleEditorMinValueChange}>
                                    </lightning-input>
                                    <lightning-input
                                        label="Max Value"
                                        value={editorMaxValue}
                                        onchange={handleEditorMaxValueChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={selectedElementIsDate}>
                                    <lightning-input
                                        type="date"
                                        label="From Date"
                                        value={editorMinValue}
                                        onchange={handleEditorMinValueChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="date"
                                        label="To Date"
                                        value={editorMaxValue}
                                        onchange={handleEditorMaxValueChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={selectedElementSupportsTextValidation}>
                                    <lightning-combobox
                                        label="Validation Rules"
                                        value={editorTextRule}
                                        options={textRuleOptions}
                                        onchange={handleEditorTextRuleChange}>
                                    </lightning-combobox>
                                </template>

                                <template if:true={selectedElementSupportsConditional}>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Conditionally"
                                        checked={editorConditionalEnabled}
                                        onchange={handleEditorConditionalEnabledChange}>
                                    </lightning-input>
                                    <template if:true={editorConditionalEnabled}>
                                        <lightning-combobox
                                            label="Source Field"
                                            value={editorConditionalFieldKey}
                                            options={conditionalFieldOptions}
                                            onchange={handleEditorConditionalFieldChange}>
                                        </lightning-combobox>
                                        <lightning-combobox
                                            label="Operator"
                                            value={editorConditionalOperator}
                                            options={conditionalOperatorOptions}
                                            onchange={handleEditorConditionalOperatorChange}>
                                        </lightning-combobox>
                                        <template if:true={selectedElementUsesConditionalValue}>
                                            <lightning-input
                                                label="Compare Value"
                                                value={editorConditionalValue}
                                                onchange={handleEditorConditionalValueChange}>
                                            </lightning-input>
                                        </template>
                                    </template>
                                </template>

                                <template if:true={selectedElementIsPicklist}>
                                    <lightning-combobox
                                        label="Salesforce Object"
                                        value={editorPicklistObject}
                                        options={salesforceObjectOptions}
                                        onchange={handleEditorPicklistObjectChange}>
                                    </lightning-combobox>
                                    <lightning-combobox
                                        label="Salesforce Picklist Field"
                                        value={editorPicklistField}
                                        options={picklistFieldOptions}
                                        onchange={handleEditorPicklistFieldChange}>
                                    </lightning-combobox>
                                </template>

                                <template if:true={selectedElementIsRadio}>
                                    <lightning-textarea
                                        label="Radio Options"
                                        value={editorRadioOptionsText}
                                        onchange={handleEditorRadioOptionsChange}>
                                    </lightning-textarea>
                                </template>

                                <template if:true={selectedElementIsDisplayText}>
                                    <lightning-input-rich-text
                                        label="Display Text"
                                        value={editorDisplayText}
                                        onchange={handleEditorDisplayTextChange}>
                                    </lightning-input-rich-text>
                                </template>

                                <template if:true={selectedElementIsImage}>
                                    <lightning-input
                                        type="file"
                                        label="Upload Image"
                                        accept="image/*"
                                        onchange={handleImageFileChange}>
                                    </lightning-input>
                                    <lightning-input
                                        label="Image URL"
                                        value={editorImageUrl}
                                        onchange={handleEditorImageUrlChange}>
                                    </lightning-input>
                                    <lightning-input
                                        label="Alt Text"
                                        value={editorImageAlt}
                                        onchange={handleEditorImageAltChange}>
                                    </lightning-input>
                                    <lightning-combobox
                                        label="Image Fit"
                                        value={editorImageFit}
                                        options={imageFitOptions}
                                        onchange={handleEditorImageFitChange}>
                                    </lightning-combobox>
                                    <lightning-input
                                        type="number"
                                        label="Image Size Percent"
                                        value={editorImageWidthPercent}
                                        min="1"
                                        max="100"
                                        onchange={handleEditorImageWidthPercentChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={selectedElementIsRepeatGroup}>
                                    <lightning-combobox
                                        label="Source Prefill Alias"
                                        value={editorRepeatSourceAlias}
                                        options={prefillAliasOptions}
                                        onchange={handleEditorRepeatSourceAliasChange}>
                                    </lightning-combobox>
                                    <lightning-input
                                        type="checkbox"
                                        label="Allow Add Rows"
                                        checked={editorAllowAddRows}
                                        onchange={handleEditorAllowAddRowsChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="checkbox"
                                        label="Allow Delete Rows"
                                        checked={editorAllowDeleteRows}
                                        onchange={handleEditorAllowDeleteRowsChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="checkbox"
                                        label="Show Labels on Each Row"
                                        checked={editorShowLabelsOnEachRow}
                                        onchange={handleEditorShowLabelsOnEachRowChange}>
                                    </lightning-input>
                                </template>

                                <div class="selection-actions">
                                    <lightning-button
                                        variant="destructive-text"
                                        label="Delete Item"
                                        onclick={handleDeleteSelected}>
                                    </lightning-button>
                                </div>
                            </div>

                            <template if:true={selectedElementSupportsSalesforceMapping}>
                                <div class="selection-card">
                                    <p class="selection-label">Salesforce Integration</p>

                                    <lightning-input
                                        type="checkbox"
                                        label="Enable Prefill"
                                        checked={editorPrefillEnabled}
                                        onchange={handleEditorPrefillEnabledChange}>
                                    </lightning-input>
                                    <template if:true={editorPrefillEnabled}>
                                        <template if:true={selectedElementIsInsideRepeatGroup}>
                                            <p class="selection-hint">{selectedRepeatGroupHint}</p>
                                        </template>
                                        <lightning-combobox
                                            label="Prefill Alias"
                                            value={editorPrefillAlias}
                                            options={prefillAliasOptions}
                                            onchange={handleEditorPrefillAliasChange}>
                                        </lightning-combobox>
                                        <lightning-combobox
                                            label="Salesforce Field"
                                            value={editorPrefillFieldPath}
                                            options={prefillFieldOptions}
                                            onchange={handleEditorPrefillFieldChange}>
                                        </lightning-combobox>
                                    </template>

                                    <lightning-input
                                        type="checkbox"
                                        label="Enable Submit"
                                        checked={editorSubmitEnabled}
                                        onchange={handleEditorSubmitEnabledChange}>
                                    </lightning-input>
                                    <template if:true={editorSubmitEnabled}>
                                        <lightning-combobox
                                            label="Submit Action"
                                            value={editorSubmitActionKey}
                                            options={submitActionOptions}
                                            onchange={handleEditorSubmitActionChange}>
                                        </lightning-combobox>
                                        <lightning-combobox
                                            label="Salesforce Field"
                                            value={editorSubmitFieldPath}
                                            options={submitFieldOptions}
                                            onchange={handleEditorSubmitFieldChange}>
                                        </lightning-combobox>
                                    </template>
                                </div>
                            </template>
                            </template>
                        </template>
                        <template if:false={selectedElement}>
                            <div class="selection-card">
                                <p class="selection-label">General</p>

                                <p class="property-inline-text">
                                    <span class="property-inline-text__label">Form:</span>
                                    <span class="property-inline-text__value">{selectedFormName}</span>
                                </p>

                                <lightning-combobox
                                    label="Theme"
                                    value={selectedThemeId}
                                    options={themeOptions}
                                    onchange={handleThemeChange}>
                                </lightning-combobox>
                            </div>

                            <div class="selection-card">
                                <p class="selection-label">Security</p>

                                <lightning-input
                                    type="checkbox"
                                    label="Enable CAPTCHA"
                                    checked={selectedFormCaptchaEnabled}
                                    onchange={handleFormCaptchaChange}>
                                </lightning-input>
                            </div>
                        </template>
                    </section>
                </div>

                <template if:true={showNewFormModal}>
                    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="new-form-modal-heading" class="slds-modal slds-fade-in-open">
                        <div class="slds-modal__container designer-new-form-modal">
                            <header class="slds-modal__header">
                                <h2 id="new-form-modal-heading" class="slds-modal__title slds-hyphenate">Create New Form</h2>
                            </header>
                            <div class="slds-modal__content slds-p-around_medium">
                                <lightning-textarea
                                    label="Description"
                                    value={newFormDescription}
                                    onchange={handleNewFormDescriptionChange}
                                    max-length="255">
                                </lightning-textarea>
                                <p class="designer-new-form-help">A new form and its first Draft version will be created immediately.</p>
                            </div>
                            <footer class="slds-modal__footer">
                                <lightning-button
                                    variant="neutral"
                                    label="Cancel"
                                    disabled={isCreatingForm}
                                    onclick={handleCloseNewFormModal}>
                                </lightning-button>
                                <lightning-button
                                    variant="brand"
                                    label="Create Form"
                                    class="slds-m-left_small"
                                    disabled={newFormCreateDisabled}
                                    onclick={handleCreateNewForm}>
                                </lightning-button>
                            </footer>
                        </div>
                    </section>
                    <div class="slds-backdrop slds-backdrop_open"></div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
