<template>
    <lightning-card title="TwinaForms Submit Actions" icon-name="utility:forward">
        <div class="shell">
            <div class="toolbar">
                <template if:true={workspaceLoaded}>
                    <div class="version-meta">
                        <span class="meta-chip">{selectedFormName}</span>
                        <span class="meta-chip">Version: {selectedVersionName}</span>
                        <span class="meta-chip">Status: {selectedVersionStatus}</span>
                    </div>
                </template>
            </div>

            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading submit actions"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <div class="layout">
                    <section class="pane pane-list">
                        <div class="pane-header">
                            <p class="page-version">{pageVersion}</p>
                            <h2>Submit Actions</h2>
                            <p class="pane-copy">Define which Salesforce records are created or updated on submit.</p>
                        </div>

                        <lightning-button
                            label="Refresh from Designer"
                            onclick={handleRefreshFromDesigner}>
                        </lightning-button>

                        <lightning-button
                            variant="brand"
                            label="New Submit Action"
                            onclick={handleAddAction}>
                        </lightning-button>

                        <template if:true={actions.length}>
                            <div class="action-list">
                                <template for:each={actions} for:item="item">
                                    <button
                                        key={item.id}
                                        type="button"
                                        class={item.cardClass}
                                        data-id={item.id}
                                        onclick={handleSelectAction}>
                                        <span class="action-meta">Action {item.displayNumber}</span>
                                        <span class="action-title">{item.objectApiName}</span>
                                        <span class="action-meta">{item.commandType}</span>
                                        <span class="action-meta">Result alias: {item.storeResultAs}</span>
                                        <span class="action-meta">Action Key: {item.actionKey}</span>
                                    </button>
                                </template>
                            </div>
                        </template>

                        <div class="help-inline-panel">
                            <h3>How It Works</h3>
                            <p><strong>Create record</strong> always creates a new row.</p>
                            <p><strong>Update by record Id</strong> updates one row using an Id already available on the form.</p>
                            <p><strong>Find and update existing record</strong> first searches by your match conditions, then updates the record if found.</p>
                            <p><strong>If no matching record is found</strong> controls whether the hosted form should show an error or create a new record instead.</p>
                            <p><strong>Value Source</strong> can come from a URL parameter, a form field, a literal value, or a previous <strong>Result Alias Field</strong>.</p>
                            <p><strong>Result Alias Field</strong> is a Pro feature. Choose a prefill alias or an earlier submit alias first, then choose one of that alias's Salesforce fields, such as <code>Contact</code> + <code>Id</code>.</p>
                            <p><strong>Upsert repeat group</strong> is a Pro feature for repeatable rows. Existing rows with an Id update, and rows without an Id create new records.</p>
                        </div>
                    </section>

                    <section class="pane pane-editor">
                        <div class="pane-header">
                            <h2>Action Definition</h2>
                        </div>

                        <template if:true={selectedAction}>
                            <div class="editor-grid">
                                <div class="editor-grid-top">
                                    <lightning-input
                                        name="storeResultAs"
                                        label="Store Result As"
                                        value={draftAction.storeResultAs}
                                        onchange={handleDraftChange}>
                                    </lightning-input>

                                    <lightning-combobox
                                        name="objectApiName"
                                        label="Salesforce Object"
                                        value={draftAction.objectApiName}
                                        options={filteredObjectOptions}
                                        onchange={handleDraftChange}>
                                    </lightning-combobox>

                                    <lightning-combobox
                                        name="commandType"
                                        label="Submit Mode"
                                        value={draftAction.commandType}
                                        options={commandTypeOptions}
                                        onchange={handleDraftChange}>
                                    </lightning-combobox>

                                    <template if:true={showNotFoundChoice}>
                                        <lightning-combobox
                                            name="onNotFound"
                                            label="If no matching record is found"
                                            value={draftAction.onNotFound}
                                            options={notFoundOptions}
                                            onchange={handleDraftChange}>
                                        </lightning-combobox>
                                    </template>
                                </div>
                                <p class="mode-help">{modeHelpText}</p>

                                <template if:true={isUpdateById}>
                                    <lightning-input
                                        name="recordIdSource"
                                        label="Record Id Source"
                                        value={draftAction.recordIdSource}
                                        onchange={handleDraftChange}>
                                    </lightning-input>
                                </template>

                                <template if:true={isFindAndUpdate}>
                                    <div class="condition-builder">
                                        <div class="condition-builder__header">
                                            <span class="condition-builder__title">Match Conditions</span>
                                        </div>
                                        <template for:each={conditionRows} for:item="row" for:index="index">
                                            <div key={row.id} class="condition-row">
                                                <div class="condition-index">{row.displayIndex}</div>
                                                <lightning-combobox
                                                    data-index={index}
                                                    name="fieldApiName"
                                                    label="Salesforce Field"
                                                    value={row.fieldApiName}
                                                    options={fieldOptions}
                                                    onchange={handleConditionChange}>
                                                </lightning-combobox>
                                                <lightning-combobox
                                                    data-index={index}
                                                    name="operator"
                                                    label="Operator"
                                                    value={row.operator}
                                                    options={operatorOptions}
                                                    onchange={handleConditionChange}>
                                                </lightning-combobox>
                                                <lightning-combobox
                                                    data-index={index}
                                                    name="valueSource"
                                                    label="Value Source"
                                                    value={row.valueSource}
                                                    options={valueSourceOptions}
                                                    onchange={handleConditionChange}>
                                                </lightning-combobox>
                                                <template if:true={row.isValueSourceField}>
                                                    <lightning-combobox
                                                        data-index={index}
                                                        name="valueText"
                                                        label={row.valueLabel}
                                                        value={row.valueText}
                                                        placeholder={row.valuePlaceholder}
                                                        options={formFieldOptions}
                                                        onchange={handleConditionChange}>
                                                    </lightning-combobox>
                                                </template>
                                                <template if:false={row.isValueSourceField}>
                                                    <template if:true={row.isValueSourceAlias}>
                                                        <lightning-combobox
                                                            data-index={index}
                                                            name="aliasName"
                                                            label="Result Alias"
                                                            value={row.selectedAliasName}
                                                            options={row.aliasOptions}
                                                            onchange={handleConditionChange}>
                                                        </lightning-combobox>
                                                        <lightning-combobox
                                                            data-index={index}
                                                            name="aliasField"
                                                            label="Alias Field"
                                                            value={row.selectedAliasField}
                                                            options={row.aliasFieldOptions}
                                                            onchange={handleConditionChange}>
                                                        </lightning-combobox>
                                                    </template>
                                                    <template if:false={row.isValueSourceAlias}>
                                                        <lightning-input
                                                            data-index={index}
                                                            name="valueText"
                                                            label={row.valueLabel}
                                                            placeholder={row.valuePlaceholder}
                                                            value={row.valueText}
                                                            onchange={handleConditionChange}>
                                                        </lightning-input>
                                                    </template>
                                                </template>
                                                <lightning-button-icon
                                                    data-index={index}
                                                    icon-name="utility:delete"
                                                    alternative-text="Delete condition"
                                                    onclick={handleDeleteCondition}>
                                                </lightning-button-icon>
                                            </div>
                                        </template>
                                        <template if:true={showConditionExpression}>
                                            <lightning-input
                                                name="conditionExpression"
                                                label="Condition Logic"
                                                value={draftAction.conditionExpression}
                                                onchange={handleConditionExpressionChange}>
                                            </lightning-input>
                                        </template>
                                        <template if:true={canAddCondition}>
                                            <lightning-button
                                                label="Add Condition"
                                                onclick={handleAddCondition}>
                                            </lightning-button>
                                        </template>
                                    </div>
                                </template>

                                <template if:true={showRepeatGroupConfig}>
                                    <div class="condition-builder">
                                        <div class="condition-builder__header">
                                            <span class="condition-builder__title">Repeat Group Settings</span>
                                        </div>
                                        <lightning-combobox
                                            name="repeatGroupKey"
                                            label="Repeat Group"
                                            value={draftAction.repeatGroupKey}
                                            options={repeatGroupOptions}
                                            onchange={handleDraftChange}>
                                        </lightning-combobox>
                                        <lightning-combobox
                                            name="relationshipField"
                                            label="Parent Relationship Field"
                                            value={draftAction.relationshipField}
                                            options={fieldOptions}
                                            onchange={handleRepeatRelationshipChange}>
                                        </lightning-combobox>
                                        <lightning-combobox
                                            name="relationshipValueSource"
                                            label="Relationship Value Source"
                                            value={draftAction.relationshipValueSource}
                                            options={valueSourceOptions}
                                            onchange={handleRepeatRelationshipSourceChange}>
                                        </lightning-combobox>
                                        <template if:true={draftAction.relationshipValueSource}>
                                            <template if:true={isRepeatRelationshipValueField}>
                                                <lightning-combobox
                                                    name="relationshipValueText"
                                                    label="Relationship Value"
                                                    value={draftAction.relationshipValueText}
                                                    options={formFieldOptions}
                                                    onchange={handleRepeatRelationshipChange}>
                                                </lightning-combobox>
                                            </template>
                                            <template if:false={isRepeatRelationshipValueField}>
                                                <template if:true={isRepeatRelationshipValueAlias}>
                                                    <lightning-combobox
                                                        name="relationshipAliasName"
                                                        label="Result Alias"
                                                        value={selectedRelationshipAliasName}
                                                        options={prefillAliasOptions}
                                                        onchange={handleRepeatRelationshipChange}>
                                                    </lightning-combobox>
                                                    <lightning-combobox
                                                        name="relationshipAliasField"
                                                        label="Alias Field"
                                                        value={selectedRelationshipAliasField}
                                                        options={relationshipAliasFieldOptions}
                                                        onchange={handleRepeatRelationshipChange}>
                                                    </lightning-combobox>
                                                </template>
                                                <template if:false={isRepeatRelationshipValueAlias}>
                                                    <lightning-input
                                                        name="relationshipValueText"
                                                        label="Relationship Value"
                                                        value={draftAction.relationshipValueText}
                                                        onchange={handleRepeatRelationshipChange}>
                                                    </lightning-input>
                                                </template>
                                            </template>
                                        </template>
                                        <lightning-input
                                            type="checkbox"
                                            name="allowDelete"
                                            label="Allow deleting rows on submit"
                                            checked={draftAction.allowDelete}
                                            onchange={handleRepeatRelationshipChange}>
                                        </lightning-input>
                                    </div>
                                </template>

                                <lightning-accordion allow-multiple-sections-open>
                                    <lightning-accordion-section name="advanced" label="Advanced">
                                        <lightning-input
                                            name="actionKey"
                                            label="Action Key"
                                            value={draftAction.actionKey}
                                            read-only>
                                        </lightning-input>
                                        <lightning-textarea
                                            name="configJson"
                                            label="Config JSON"
                                            value={draftAction.configJson}
                                            read-only>
                                        </lightning-textarea>
                                    </lightning-accordion-section>
                                </lightning-accordion>

                                <div class="editor-actions">
                                    <lightning-button
                                        variant="brand"
                                        label="Save Submit Action"
                                        onclick={handleSaveAction}>
                                    </lightning-button>
                                    <lightning-button
                                        variant="destructive-text"
                                        label="Delete"
                                        onclick={handleDeleteAction}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-help">
                        <div class="pane-header">
                            <h2>Form Mapping Summary</h2>
                        </div>
                        <div class="help-copy">
                            <template if:true={hasMappingGroups}>
                                <div class="mapping-groups">
                                    <template for:each={mappingGroups} for:item="group">
                                        <div key={group.key} class={group.groupClass}>
                                            <p><strong>Action:</strong> <code>{group.title}</code></p>
                                            <p><strong>Salesforce Object:</strong> <code>{group.objectApiName}</code></p>
                                            <template if:true={group.hasFields}>
                                                <div class="mapping-list">
                                                    <template for:each={group.fields} for:item="field">
                                                        <div key={field.key} class="mapping-row">
                                                            <span class="mapping-row__label">{field.label}</span>
                                                            <span class="mapping-row__arrow">&#8594;</span>
                                                            <span class="mapping-row__field">{field.fieldPath}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:false={group.hasFields}>
                                                <p>No form fields are mapped to this submit action yet.</p>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasMappingGroups}>
                                <p>No submit actions exist for this form yet.</p>
                            </template>
                        </div>
                    </section>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
