<template>
    <lightning-card title="NativeForms Prefill Actions" icon-name="utility:search">
        <div class="shell">
            <div class="toolbar">
                <template if:true={workspaceLoaded}>
                    <div class="version-meta">
                        <span class="meta-chip">{selectedFormName}</span>
                        <span class="meta-chip">Version: {selectedVersionName}</span>
                        <span class="meta-chip">Status: {selectedVersionStatus}</span>
                    </div>
                </template>
            </div>

            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading prefill actions"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <div class="layout">
                    <section class="pane pane-list">
                        <div class="pane-header">
                            <p class="page-version">{pageVersion}</p>
                            <h2>Prefill Actions</h2>
                            <p class="pane-copy">Define aliases by querying Salesforce records.</p>
                        </div>

                        <lightning-button
                            label="Refresh from Designer"
                            onclick={handleRefreshFromDesigner}>
                        </lightning-button>

                        <lightning-button
                            variant="brand"
                            label="New Prefill Action"
                            onclick={handleAddAction}>
                        </lightning-button>

                        <template if:true={actions.length}>
                            <div class="action-list">
                                <template for:each={actions} for:item="item">
                                    <button
                                        key={item.id}
                                        type="button"
                                        class={item.cardClass}
                                        data-id={item.id}
                                        onclick={handleSelectAction}>
                                        <span class="action-meta">Action {item.displayNumber}</span>
                                        <span class="action-title">{item.storeResultAs}</span>
                                        <span class="action-meta">{item.objectApiName} • {item.commandType}</span>
                                        <span class="action-meta">Action Key: {item.actionKey}</span>
                                    </button>
                                </template>
                            </div>
                        </template>

                        <div class="help-inline-panel">
                            <h3>How It Works</h3>
                            <p><strong>Salesforce Field</strong> is the field on the selected object that you want to search, such as <code>Email</code> or <code>ContactId</code>.</p>
                            <p><strong>Value Source</strong> controls where the right side comes from:</p>
                            <p><strong>URL Parameter</strong> uses a value from the page address, such as <code>?email=test@example.com</code>.</p>
                            <p><strong>Form Field</strong> uses a value already on the form.</p>
                            <p><strong>Literal Value</strong> compares against fixed text or a number.</p>
                            <p><strong>Prefill Alias Field</strong> is a Pro feature. Choose a previous prefill alias first, then choose one of that alias's Salesforce fields, such as <code>Contact</code> + <code>Id</code>.</p>
                            <p><strong>findOne</strong> returns one record. <strong>findMany</strong> returns multiple records and needs a <strong>Limit</strong>.</p>
                            <p><strong>On Not Found = Ignore</strong> means the form continues without prefilling. <strong>Error</strong> means the hosted form should stop and show a failure.</p>
                        </div>
                    </section>

                    <section class="pane pane-editor">
                        <div class="pane-header">
                            <h2>Action Definition</h2>
                        </div>

                        <template if:true={selectedAction}>
                            <div class="editor-grid">
                                <div class="editor-grid-top">
                                    <lightning-input
                                        name="storeResultAs"
                                        label="Alias / Store Result As"
                                        value={draftAction.storeResultAs}
                                        onchange={handleDraftChange}>
                                    </lightning-input>

                                    <lightning-combobox
                                        name="objectApiName"
                                        label="Salesforce Object"
                                        value={draftAction.objectApiName}
                                        options={filteredObjectOptions}
                                        onchange={handleDraftChange}>
                                    </lightning-combobox>

                                    <lightning-combobox
                                        name="commandType"
                                        label="Command Type"
                                        value={draftAction.commandType}
                                        options={commandTypeOptions}
                                        onchange={handleDraftChange}>
                                    </lightning-combobox>

                                    <lightning-combobox
                                        name="onNotFound"
                                        label="On Not Found"
                                        value={draftAction.onNotFound}
                                        options={notFoundOptions}
                                        onchange={handleDraftChange}>
                                    </lightning-combobox>
                                </div>

                                <div class="condition-builder">
                                    <div class="condition-builder__header">
                                        <span class="condition-builder__title">Match Conditions</span>
                                    </div>
                                    <template for:each={conditionRows} for:item="row" for:index="index">
                                        <div key={row.id} class="condition-row">
                                            <div class="condition-index">{row.displayIndex}</div>
                                            <lightning-combobox
                                                data-index={index}
                                                name="fieldApiName"
                                                label="Salesforce Field"
                                                value={row.fieldApiName}
                                                options={fieldOptions}
                                                onchange={handleConditionChange}>
                                            </lightning-combobox>
                                            <lightning-combobox
                                                data-index={index}
                                                name="operator"
                                                label="Operator"
                                                value={row.operator}
                                                options={operatorOptions}
                                                onchange={handleConditionChange}>
                                            </lightning-combobox>
                                            <lightning-combobox
                                                data-index={index}
                                                name="valueSource"
                                                label="Value Source"
                                                value={row.valueSource}
                                                options={valueSourceOptions}
                                                onchange={handleConditionChange}>
                                            </lightning-combobox>
                                            <template if:true={row.isValueSourceField}>
                                                <lightning-combobox
                                                    data-index={index}
                                                    name="valueText"
                                                    label={row.valueLabel}
                                                    value={row.valueText}
                                                    placeholder={row.valuePlaceholder}
                                                    options={formFieldOptions}
                                                    onchange={handleConditionChange}>
                                                </lightning-combobox>
                                            </template>
                                            <template if:false={row.isValueSourceField}>
                                                <template if:true={row.isValueSourceAlias}>
                                                    <lightning-combobox
                                                        data-index={index}
                                                        name="aliasName"
                                                        label="Prefill Alias"
                                                        value={row.selectedAliasName}
                                                        options={row.aliasOptions}
                                                        onchange={handleConditionChange}>
                                                    </lightning-combobox>
                                                    <lightning-combobox
                                                        data-index={index}
                                                        name="aliasField"
                                                        label="Alias Field"
                                                        value={row.selectedAliasField}
                                                        options={row.aliasFieldOptions}
                                                        onchange={handleConditionChange}>
                                                    </lightning-combobox>
                                                </template>
                                                <template if:false={row.isValueSourceAlias}>
                                                    <lightning-input
                                                        data-index={index}
                                                        name="valueText"
                                                        label={row.valueLabel}
                                                        placeholder={row.valuePlaceholder}
                                                        value={row.valueText}
                                                        onchange={handleConditionChange}>
                                                    </lightning-input>
                                                </template>
                                            </template>
                                            <lightning-button-icon
                                                data-index={index}
                                                icon-name="utility:delete"
                                                alternative-text="Delete condition"
                                                onclick={handleDeleteCondition}>
                                            </lightning-button-icon>
                                        </div>
                                    </template>
                                    <template if:true={showConditionExpression}>
                                        <lightning-input
                                            name="conditionExpression"
                                            label="Condition Logic"
                                            value={draftAction.conditionExpression}
                                            onchange={handleConditionExpressionChange}>
                                        </lightning-input>
                                    </template>
                                    <template if:true={canAddCondition}>
                                        <lightning-button
                                            label="Add Condition"
                                            onclick={handleAddCondition}>
                                        </lightning-button>
                                    </template>
                                </div>

                                <template if:true={isFindMany}>
                                    <div class="order-row">
                                        <lightning-combobox
                                            name="orderByField"
                                            label="Order By"
                                            value={draftAction.orderByField}
                                            options={orderByFieldOptions}
                                            onchange={handleDraftChange}>
                                        </lightning-combobox>

                                        <div class="sort-direction">
                                            <span class="sort-direction__label">Sort Direction</span>
                                            <div class="sort-direction__options">
                                                <label class="sort-direction__option">
                                                    <input
                                                        type="radio"
                                                        name="orderByDirection"
                                                        value="ASC"
                                                        checked={isOrderAscending}
                                                        onchange={handleOrderDirectionChange}>
                                                    <span>Ascending</span>
                                                </label>
                                                <label class="sort-direction__option">
                                                    <input
                                                        type="radio"
                                                        name="orderByDirection"
                                                        value="DESC"
                                                        checked={isOrderDescending}
                                                        onchange={handleOrderDirectionChange}>
                                                    <span>Descending</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <lightning-input
                                        type="number"
                                        name="limitValue"
                                        label="Limit"
                                        value={draftAction.limitValue}
                                        onchange={handleDraftChange}>
                                    </lightning-input>
                                </template>

                                <lightning-accordion allow-multiple-sections-open>
                                    <lightning-accordion-section name="advanced" label="Advanced">
                                        <lightning-input
                                            name="actionKey"
                                            label="Action Key"
                                            value={draftAction.actionKey}
                                            read-only>
                                        </lightning-input>
                                        <lightning-textarea
                                            name="configJson"
                                            label="Config JSON"
                                            value={draftAction.configJson}
                                            read-only>
                                        </lightning-textarea>
                                        <p class="help-inline">
                                            Queried Salesforce fields are derived from the builder field mappings for this alias.
                                        </p>
                                    </lightning-accordion-section>
                                </lightning-accordion>

                                <div class="editor-actions">
                                    <lightning-button
                                        variant="brand"
                                        label="Save Prefill Action"
                                        onclick={handleSaveAction}>
                                    </lightning-button>
                                    <lightning-button
                                        variant="destructive-text"
                                        label="Delete"
                                        onclick={handleDeleteAction}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-help">
                        <div class="pane-header">
                            <h2>Form Mapping Summary</h2>
                        </div>
                        <div class="help-copy">
                            <template if:true={hasMappingGroups}>
                                <div class="mapping-groups">
                                    <template for:each={mappingGroups} for:item="group">
                                        <div key={group.key} class={group.groupClass}>
                                            <p><strong>Alias:</strong> <code>{group.title}</code></p>
                                            <p><strong>Salesforce Object:</strong> <code>{group.objectApiName}</code></p>
                                            <template if:true={group.hasFields}>
                                                <div class="mapping-list">
                                                    <template for:each={group.fields} for:item="field">
                                                        <div key={field.key} class="mapping-row">
                                                            <span class="mapping-row__label">{field.label}</span>
                                                            <span class="mapping-row__arrow">&#8594;</span>
                                                            <span class="mapping-row__field">{field.fieldPath}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                            <template if:false={group.hasFields}>
                                                <p>No form fields are mapped to this prefill alias yet.</p>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasMappingGroups}>
                                <p>No prefill actions exist for this form yet.</p>
                            </template>
                        </div>
                    </section>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
