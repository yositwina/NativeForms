<template>
    <lightning-card title="NativeForms Prefill Actions" icon-name="utility:search">
        <div class="shell">
            <div class="toolbar">
                <template if:true={workspaceLoaded}>
                    <div class="version-meta">
                        <span class="meta-chip">{selectedFormName}</span>
                        <span class="meta-chip">Version: {selectedVersionName}</span>
                        <span class="meta-chip">Status: {selectedVersionStatus}</span>
                    </div>
                </template>
            </div>

            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading prefill actions"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <div class="layout">
                    <section class="pane pane-list">
                        <div class="pane-header">
                            <h2>Prefill Actions</h2>
                            <p class="pane-copy">Define aliases by querying Salesforce records.</p>
                        </div>

                        <lightning-button
                            label="Refresh from Designer"
                            onclick={handleRefreshFromDesigner}>
                        </lightning-button>

                        <lightning-button
                            variant="brand"
                            label="New Prefill Action"
                            onclick={handleAddAction}>
                        </lightning-button>

                        <template if:true={actions.length}>
                            <div class="action-list">
                                <template for:each={actions} for:item="item">
                                    <button
                                        key={item.id}
                                        type="button"
                                        class={item.cardClass}
                                        data-id={item.id}
                                        onclick={handleSelectAction}>
                                        <span class="action-title">{item.storeResultAs}</span>
                                        <span class="action-meta">{item.objectApiName} • {item.commandType}</span>
                                        <span class="action-meta">Alias used in builder</span>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-editor">
                        <div class="pane-header">
                            <h2>Action Definition</h2>
                        </div>

                        <template if:true={selectedAction}>
                            <div class="editor-grid">
                                <lightning-input
                                    name="storeResultAs"
                                    label="Alias / Store Result As"
                                    value={draftAction.storeResultAs}
                                    onchange={handleDraftChange}>
                                </lightning-input>

                                <lightning-input
                                    type="search"
                                    name="objectSearch"
                                    label="Search Objects"
                                    value={objectSearch}
                                    onchange={handleObjectSearch}>
                                </lightning-input>

                                <lightning-combobox
                                    name="objectApiName"
                                    label="Salesforce Object"
                                    value={draftAction.objectApiName}
                                    options={filteredObjectOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <lightning-combobox
                                    name="commandType"
                                    label="Command Type"
                                    value={draftAction.commandType}
                                    options={commandTypeOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <div class="condition-builder">
                                    <div class="condition-builder__header">
                                        <span class="condition-builder__title">Match Conditions</span>
                                        <lightning-combobox
                                            name="conditionLogic"
                                            label="Join Conditions With"
                                            value={draftAction.conditionLogic}
                                            options={conditionLogicOptions}
                                            onchange={handleDraftChange}>
                                        </lightning-combobox>
                                    </div>
                                    <template for:each={conditionRows} for:item="row" for:index="index">
                                        <div key={row.id} class="condition-row">
                                            <lightning-combobox
                                                data-index={index}
                                                name="fieldApiName"
                                                label="Salesforce Field"
                                                value={row.fieldApiName}
                                                options={fieldOptions}
                                                onchange={handleConditionChange}>
                                            </lightning-combobox>
                                            <lightning-combobox
                                                data-index={index}
                                                name="operator"
                                                label="Operator"
                                                value={row.operator}
                                                options={operatorOptions}
                                                onchange={handleConditionChange}>
                                            </lightning-combobox>
                                            <lightning-input
                                                data-index={index}
                                                name="paramName"
                                                label="URL Parameter"
                                                value={row.paramName}
                                                onchange={handleConditionChange}>
                                            </lightning-input>
                                            <lightning-button-icon
                                                data-index={index}
                                                icon-name="utility:delete"
                                                alternative-text="Delete condition"
                                                onclick={handleDeleteCondition}>
                                            </lightning-button-icon>
                                        </div>
                                    </template>
                                    <lightning-button
                                        label="Add Condition"
                                        onclick={handleAddCondition}>
                                    </lightning-button>
                                </div>

                                <lightning-combobox
                                    name="onNotFound"
                                    label="On Not Found"
                                    value={draftAction.onNotFound}
                                    options={notFoundOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <template if:true={isFindMany}>
                                    <lightning-input
                                        name="orderBy"
                                        label="Order By"
                                        value={draftAction.orderBy}
                                        onchange={handleDraftChange}>
                                    </lightning-input>

                                    <lightning-input
                                        type="number"
                                        name="limitValue"
                                        label="Limit"
                                        value={draftAction.limitValue}
                                        onchange={handleDraftChange}>
                                    </lightning-input>
                                </template>

                                <lightning-accordion allow-multiple-sections-open>
                                    <lightning-accordion-section name="advanced" label="Advanced">
                                        <lightning-input
                                            name="actionKey"
                                            label="Action Key"
                                            value={draftAction.actionKey}
                                            onchange={handleDraftChange}>
                                        </lightning-input>
                                        <lightning-textarea
                                            name="configJson"
                                            label="Config JSON"
                                            value={draftAction.configJson}
                                            onchange={handleDraftChange}>
                                        </lightning-textarea>
                                        <p class="help-inline">
                                            Queried Salesforce fields are derived from the builder field mappings for this alias.
                                        </p>
                                    </lightning-accordion-section>
                                </lightning-accordion>

                                <div class="editor-actions">
                                    <lightning-button
                                        variant="brand"
                                        label="Save Prefill Action"
                                        onclick={handleSaveAction}>
                                    </lightning-button>
                                    <lightning-button
                                        variant="destructive-text"
                                        label="Delete"
                                        onclick={handleDeleteAction}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-help">
                        <div class="pane-header">
                            <h2>Used In Form</h2>
                        </div>
                        <div class="help-copy">
                            <template if:true={hasFilteredMappings}>
                                <template for:each={filteredMappings} for:item="mapping">
                                    <div key={mapping.elementId} class="mapping-card">
                                        <p><strong>{mapping.elementLabel}</strong></p>
                                        <p>Field Key: <code>{mapping.fieldKey}</code></p>
                                        <p>Salesforce Field: <code>{mapping.fieldPath}</code></p>
                                    </div>
                                </template>
                            </template>
                            <template if:false={hasFilteredMappings}>
                                <p>No form fields are mapped to this prefill alias yet.</p>
                            </template>
                            <hr />
                            <p><strong>How It Works</strong></p>
                            <p><strong>&#123;params.name&#125;</strong> means a URL query parameter, for example <code>?email=test@example.com</code>.</p>
                            <p><strong>Salesforce Field</strong> is a field on the selected object, such as <code>Email</code>.</p>
                            <p><strong>On Not Found = Ignore</strong> means the form continues without prefilling. <strong>Error</strong> means the runtime should stop and show a failure.</p>
                        </div>
                    </section>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
