<template>
    <lightning-card title="NativeForms Prefill Actions" icon-name="utility:search">
        <div class="shell">
            <div class="toolbar">
                <lightning-combobox
                    name="versionId"
                    label="Form Version"
                    value={selectedVersionId}
                    options={versionOptions}
                    onchange={handleVersionChange}>
                </lightning-combobox>

                <template if:true={workspaceLoaded}>
                    <div class="version-meta">
                        <p class="eyebrow">Form</p>
                        <p class="meta-title">{selectedFormName}</p>
                        <p class="meta-inline">Version: {selectedVersionName}</p>
                        <p class="meta-inline">Status: {selectedVersionStatus}</p>
                    </div>
                </template>
            </div>

            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading prefill actions"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <div class="layout">
                    <section class="pane pane-list">
                        <div class="pane-header">
                            <p class="eyebrow">Left</p>
                            <h2>Prefill Actions</h2>
                            <p class="pane-copy">Define aliases by querying Salesforce records.</p>
                        </div>

                        <lightning-button
                            variant="brand"
                            label="New Prefill Action"
                            onclick={handleAddAction}>
                        </lightning-button>

                        <template if:true={actions.length}>
                            <div class="action-list">
                                <template for:each={actions} for:item="item">
                                    <button
                                        key={item.id}
                                        type="button"
                                        class={item.cardClass}
                                        data-id={item.id}
                                        onclick={handleSelectAction}>
                                        <span class="action-title">{item.storeResultAs}</span>
                                        <span class="action-meta">{item.objectApiName} • {item.commandType}</span>
                                        <span class="action-meta">Alias used in builder</span>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-editor">
                        <div class="pane-header">
                            <p class="eyebrow">Center</p>
                            <h2>Action Definition</h2>
                        </div>

                        <template if:true={selectedAction}>
                            <div class="editor-grid">
                                <lightning-input
                                    name="storeResultAs"
                                    label="Alias / Store Result As"
                                    value={draftAction.storeResultAs}
                                    onchange={handleDraftChange}>
                                </lightning-input>

                                <lightning-input
                                    type="search"
                                    name="objectSearch"
                                    label="Search Objects"
                                    value={objectSearch}
                                    onchange={handleObjectSearch}>
                                </lightning-input>

                                <lightning-combobox
                                    name="objectApiName"
                                    label="Salesforce Object"
                                    value={draftAction.objectApiName}
                                    options={filteredObjectOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <lightning-combobox
                                    name="commandType"
                                    label="Command Type"
                                    value={draftAction.commandType}
                                    options={commandTypeOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <lightning-textarea
                                    name="whereClause"
                                    label="Where Condition"
                                    value={draftAction.whereClause}
                                    onchange={handleDraftChange}>
                                </lightning-textarea>

                                <lightning-combobox
                                    name="onNotFound"
                                    label="On Not Found"
                                    value={draftAction.onNotFound}
                                    options={notFoundOptions}
                                    onchange={handleDraftChange}>
                                </lightning-combobox>

                                <template if:true={isFindMany}>
                                    <lightning-input
                                        name="orderBy"
                                        label="Order By"
                                        value={draftAction.orderBy}
                                        onchange={handleDraftChange}>
                                    </lightning-input>

                                    <lightning-input
                                        type="number"
                                        name="limitValue"
                                        label="Limit"
                                        value={draftAction.limitValue}
                                        onchange={handleDraftChange}>
                                    </lightning-input>
                                </template>

                                <lightning-accordion allow-multiple-sections-open>
                                    <lightning-accordion-section name="advanced" label="Advanced">
                                        <lightning-input
                                            name="actionKey"
                                            label="Action Key"
                                            value={draftAction.actionKey}
                                            onchange={handleDraftChange}>
                                        </lightning-input>
                                        <lightning-textarea
                                            name="configJson"
                                            label="Config JSON"
                                            value={draftAction.configJson}
                                            onchange={handleDraftChange}>
                                        </lightning-textarea>
                                        <p class="help-inline">
                                            Queried Salesforce fields are derived from the builder field mappings for this alias.
                                        </p>
                                    </lightning-accordion-section>
                                </lightning-accordion>

                                <div class="editor-actions">
                                    <lightning-button
                                        variant="brand"
                                        label="Save Prefill Action"
                                        onclick={handleSaveAction}>
                                    </lightning-button>
                                    <lightning-button
                                        variant="destructive-text"
                                        label="Delete"
                                        onclick={handleDeleteAction}>
                                    </lightning-button>
                                </div>
                            </div>
                        </template>
                    </section>

                    <section class="pane pane-help">
                        <div class="pane-header">
                            <p class="eyebrow">Right</p>
                            <h2>How It Works</h2>
                        </div>
                        <div class="help-copy">
                            <p>A prefill action creates an alias by querying Salesforce.</p>
                            <p>Example:</p>
                            <p><code>Contact where Email = &#123;input.email&#125;</code></p>
                            <p>Alias: <code>foundContact</code></p>
                            <p>Then fields can map to:</p>
                            <p><code>foundContact.FirstName</code></p>
                            <p><code>foundContact.LastName</code></p>
                        </div>
                    </section>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
