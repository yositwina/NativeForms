<template>
    <lightning-card title="TwinaForms Home" icon-name="custom:custom18">
        <div class="shell">
            <template if:true={errorMessage}>
                <div class="panel-error">{errorMessage}</div>
            </template>

            <template if:true={successMessage}>
                <div class="panel-success">{successMessage}</div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-wrap">
                    <lightning-spinner alternative-text="Loading TwinaForms Home" size="small"></lightning-spinner>
                </div>
            </template>

            <template if:false={isLoading}>
                <section class="hero">
                    <div class="hero__copy">
                        <span class="hero__eyebrow">Workspace Overview</span>
                        <h2>{heroHeading}</h2>
                        <p>{heroCopy}</p>
                    </div>

                    <div class="hero__meta">
                        <div class="hero__pills">
                            <span class={connectionBadgeClass}>{connectionBadgeLabel}</span>
                            <span class={planBadgeClass}>{planLabel}</span>
                        </div>

                        <template if:true={showPrimaryAction}>
                            <lightning-button
                                variant="brand"
                                label={primaryActionLabel}
                                onclick={handlePrimaryAction}
                            ></lightning-button>
                        </template>
                    </div>
                </section>

                <section class="top-grid">
                    <article class="summary-card summary-card--accent">
                        <div class="section-heading">
                            <div>
                                <span class="section-kicker">Connection Status</span>
                                <h3>{connectionCardTitle}</h3>
                            </div>
                        </div>

                        <div class="detail-list">
                            <div class="detail-list__row">
                                <span>Secret key added to External Credential</span>
                                <strong>{connection.secretKeyLabel}</strong>
                            </div>
                            <div class="detail-list__row">
                                <span>Permission set access configured</span>
                                <strong>{connection.permissionSetLabel}</strong>
                            </div>
                        </div>

                        <template if:true={connection.needsConnectAction}>
                            <div class="helper-row">
                                <p class="helper-copy">Finish setup on the Connect page.</p>
                                <lightning-button
                                    variant="base"
                                    label="Open Connect Page"
                                    onclick={handleOpenConnect}
                                ></lightning-button>
                            </div>
                        </template>
                    </article>

                    <article class="summary-card">
                        <div class="section-heading">
                            <div>
                                <span class="section-kicker">Current Plan</span>
                                <h3>{plan.label}</h3>
                            </div>
                        </div>

                        <p class="card-copy">{plan.description}</p>

                        <div class="detail-list">
                            <div class="detail-list__row"><span>Forms Allowed</span><strong>{planMaxFormsLabel}</strong></div>
                            <div class="detail-list__row"><span>Demo data installed</span><strong>{demo.installedLabel}</strong></div>
                        </div>

                        <div class="action-row">
                            <template if:false={demo.installed}>
                                <lightning-button
                                    variant="neutral"
                                    label="Install Demo Records"
                                    onclick={handleInstall}
                                    disabled={installDisabled}
                                ></lightning-button>
                            </template>

                            <template if:true={showPlanUpgradeAction}>
                                <lightning-button
                                    variant="brand-outline"
                                    label="Upgrade Plan"
                                    onclick={handleOpenUpgrade}
                                ></lightning-button>
                            </template>
                        </div>
                    </article>

                    <article class="summary-card">
                        <div class="section-heading">
                            <div>
                                <span class="section-kicker">Usage &amp; Limits</span>
                                <h3>Current workspace usage</h3>
                            </div>
                        </div>

                        <div class="detail-list">
                            <div class="detail-list__row"><span>Forms</span><strong>{usage.formsUsageLabel}</strong></div>
                            <div class="detail-list__row"><span>Submissions This Month</span><strong>{usage.submissionsUsageLabel}</strong></div>
                            <div class="detail-list__row"><span>Active Users</span><strong>{usage.activeUsersLabel}</strong></div>
                        </div>
                    </article>
                </section>

                <template if:true={showUpgradeSection}>
                    <section class="section-block section-block--upgrade">
                        <div class="section-heading section-heading--wide">
                            <div>
                                <span class="section-kicker">Unlock More</span>
                                <h3>Upgrade when you are ready for broader production use</h3>
                            </div>
                        </div>

                        <div class="upgrade-list">
                            <template for:each={upgradeFeatures} for:item="feature">
                                <div key={feature.key} class="upgrade-list__row">
                                    <span class="upgrade-list__dot"></span>
                                    <span class="upgrade-list__body">
                                        <span class="upgrade-list__label">{feature.label}</span>
                                        <template if:true={feature.detail}>
                                            <span class="upgrade-list__detail">{feature.detail}</span>
                                        </template>
                                    </span>
                                </div>
                            </template>
                        </div>

                        <div class="section-actions">
                            <lightning-button
                                variant="neutral"
                                label="Compare Plans"
                                onclick={handleOpenComparePlans}
                            ></lightning-button>
                            <lightning-button
                                variant="brand"
                                label="Upgrade Plan"
                                onclick={handleOpenUpgrade}
                            ></lightning-button>
                        </div>
                    </section>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
